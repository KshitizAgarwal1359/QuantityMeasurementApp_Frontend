<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quantity Measurement</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.auth-page {
            background-color: #eef2f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--font-family);
            color: #2c3e50;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .icon-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .bg-blue { background-color: #3b68ff; }
        .bg-green { background-color: #4caf50; }
        .bg-red { background-color: #f44336; }
        .bg-purple { background-color: #9c27b0; }
        
        .auth-title { font-size: 2rem; font-weight: 800; margin-bottom: 10px; color: #1a233a; }
        .auth-subtitle { color: #667085; font-size: 1rem; }
        
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 450px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 0.85rem;
            color: #344054;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .form-group input {
            padding: 12px 15px;
            border: 1px solid #d0d5dd;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #1a233a;
        }
        .form-group input::placeholder {
            color: #98a2b3;
        }
        .form-group input:focus {
            border-color: #3b68ff;
            box-shadow: 0 0 0 3px rgba(59, 104, 255, 0.15);
        }
        
        .auth-btn {
            background: #3b68ff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .auth-btn:hover { background: #2a4ec9; }
        
        .auth-footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #667085;
        }
        .auth-footer-text a {
            color: #3b68ff;
            text-decoration: none;
            font-weight: 600;
        }
        
        .page-footer {
            margin-top: 40px;
            color: #667085;
            font-size: 0.85rem;
            text-align: center;
        }
        .footer-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 10px;
        }
        .footer-links span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body class="auth-page">

    <div class="auth-header">
        <div class="icon-row">
            <div class="icon-circle bg-blue">📏</div>
            <div class="icon-circle bg-green">🧮</div>
            <div class="icon-circle bg-red">🌡️</div>
            <div class="icon-circle bg-purple">⚖️</div>
        </div>
        <h1 class="auth-title">Quantity Measurement App</h1>
        <p class="auth-subtitle">Convert, compare, and calculate measurements with precision</p>
    </div>

    <div class="auth-card">
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="auth-btn">Sign In</button>
            
            <div class="auth-footer-text">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>
        </form>
    </div>

    <div class="page-footer">
        <p>Powerful measurement tools:</p>
        <div class="footer-links">
            <span>📏 Conversions</span>
            <span>⚖️ Comparisons</span>
            <span>🧮 Arithmetic</span>
        </div>
    </div>
    
    <div id="toast-container" class="toast-container"></div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.auth-btn');
            const originalText = btn.textContent;
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const response = await ApiService.login(u, p);
                if(response && response.token) {
                    localStorage.setItem('token', response.token);
                    window.location.href = 'index.html';
                }
            } catch(error) {
                alert(error.message);
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
