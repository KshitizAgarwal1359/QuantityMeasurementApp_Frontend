<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantity Measurement App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="app-header">
        <h1>Welcome To Quantity Measurement</h1>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </header>

    <main class="app-main">
        <section class="type-selector">
            <h2 class="section-title">CHOOSE TYPE</h2>
            <div class="cards-container">
                <div class="card type-card selected" data-type="LENGTH">
                    <div class="icon">📏</div>
                    <span>Length</span>
                </div>
                <div class="card type-card" data-type="WEIGHT">
                    <div class="icon">⚖️</div>
                    <span>Weight</span>
                </div>
                <div class="card type-card" data-type="TEMPERATURE">
                    <div class="icon">🌡️</div>
                    <span>Temperature</span>
                </div>
                <div class="card type-card" data-type="VOLUME">
                    <div class="icon">🥛</div>
                    <span>Volume</span>
                </div>
            </div>
        </section>

        <section class="action-selector">
            <h2 class="section-title">CHOOSE ACTION</h2>
            <div class="cards-container action-tabs">
                <button class="action-tab selected" data-action="comparison">Comparison</button>
                <button class="action-tab" data-action="conversion">Conversion</button>
                <button class="action-tab" data-action="arithmetic">Arithmetic</button>
            </div>
        </section>

        <!-- Dynamic Content Area -->
        <section id="dynamic-area" class="dynamic-area">
            <!-- Will be populated by JS based on selected action -->
        </section>
        
        <!-- Templates for different views to keep HTML clean and use JS to swap -->
        <template id="conversion-template">
            <div class="conversion-view">
                <div class="input-group">
                    <label>FROM</label>
                    <input type="number" id="from-value" placeholder="Enter value">
                    <select id="from-unit"></select>
                </div>
                <div class="input-group">
                    <label>TO</label>
                    <input type="number" id="to-value" class="result-input" readonly>
                    <select id="to-unit"></select>
                </div>
            </div>
            <div class="button-group" style="display: flex; gap: 15px; margin-bottom: 20px;">
                <button id="convert-btn" class="calc-btn" style="flex: 1; background: var(--primary-blue); color: white; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(88, 115, 255, 0.3); transition: 0.3s;">Convert</button>
                <button class="clear-btn" style="flex: 1; background: white; color: var(--text-color); border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">Clear</button>
            </div>
        </template>

        <template id="comparison-template">
            <div class="comparison-view">
                <div class="input-group">
                    <label>VALUE 1</label>
                    <input type="number" id="comp-value1" placeholder="Enter value">
                    <select id="comp-unit1"></select>
                </div>
                <div class="compare-middle">
                    <div id="compare-result-icon" class="compare-icon">?</div>
                </div>
                <div class="input-group">
                    <label>VALUE 2</label>
                    <input type="number" id="comp-value2" placeholder="Enter value">
                    <select id="comp-unit2"></select>
                </div>
            </div>
            <div class="button-group" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <button id="compare-btn" class="calc-btn" style="flex: 1; background: var(--primary-blue); color: white; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(88, 115, 255, 0.3); transition: 0.3s;">Compare</button>
                <button class="clear-btn" style="flex: 1; background: white; color: var(--text-color); border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">Clear</button>
            </div>
            <div class="result-box">
                <label>RESULT</label>
                <div class="result-text" id="comp-final-result">Equal</div>
            </div>
        </template>

        <template id="arithmetic-template">
            <div class="arithmetic-view">
                <div class="input-group">
                    <label>VALUE 1</label>
                    <input type="number" id="arith-value1" placeholder="Enter value">
                    <select id="arith-unit1"></select>
                </div>
                <div class="arithmetic-middle">
                    <select id="operator-select" class="operator-select" style="padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 1.2rem; cursor: pointer;">
                        <option value="+">+</option>
                        <option value="-">-</option>
                        <option value="/">/</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>VALUE 2</label>
                    <input type="number" id="arith-value2" placeholder="Enter value">
                    <select id="arith-unit2"></select>
                </div>
            </div>
            <div class="button-group" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <button id="calculate-btn" class="calc-btn" style="flex: 1; background: var(--primary-blue); color: white; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; box-shadow: 0 4px 10px rgba(88, 115, 255, 0.3); transition: 0.3s;">Calculate</button>
                <button class="clear-btn" style="flex: 1; background: white; color: var(--text-color); border: 1px solid var(--border); padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">Clear</button>
            </div>
            <div class="result-box">
                <label>RESULT</label>
                <div class="result-row">
                    <div class="result-text" id="arith-final-result">---</div>
                    <select id="arith-result-unit"></select>
                </div>
            </div>
        </template>

    </main>
    
    <div id="history-section" class="history-box" style="display: none; max-width: 600px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);">
        <h3 style="margin-top: 0; color: var(--primary-blue); font-size: 16px; border-bottom: 2px solid #EDF2FC; padding-bottom: 10px; margin-bottom: 15px;">Your Activity History</h3>
        <div id="history-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 250px; overflow-y: auto;">
            <!-- History items injected here -->
            <div style="font-size: 13px; color: #7CA1F3; text-align: center;">No history available yet.</div>
        </div>
    </div>
    <!-- Error/Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
